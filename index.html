<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LETRSETR</title>
</head>
<body>

<div id="top-bar">
<div id="top-bar-tab"></div>
<header>
  <h1>LETRSETR</h1>
  <p class="subtitle">Type · Drag · Arrange</p>
</header>

<div class="controls">
  <label for="letterInput">Letters:</label>
  <input type="text" id="letterInput" placeholder="e.g. ANAGRAM" maxlength="60"
    autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
  <button class="btn" id="addBtn">Add Tiles</button>
  <button class="btn btn-clear" id="clearBtn">Clear</button>
  <input type="range" id="sizeSlider" min="30" max="96" value="60"
    style="width:90px;accent-color:#e9c46a;touch-action:auto;cursor:pointer;">
  <div style="position:relative;">
    <button id="gearBtn" style="
      padding:9px 12px;font-size:2.2rem;line-height:1;
      background:none;border:none;color:var(--accent-dim);
      cursor:pointer;touch-action:auto;
    " aria-label="Settings">⚙︎</button>
    <div id="settingsPanel" style="
      display:none;
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      min-width:220px;
      background:rgba(40,40,40,0.82);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border:1px solid var(--accent-border);
      border-radius:10px;
      box-shadow:0 8px 32px rgba(0,0,0,0.5);
      padding:12px 0 8px;
      z-index:200;
    ">
      <div class="setting-item" style="-webkit-user-select:none;user-select:none;">
        <div id="colorTargetToggle" style="display:flex;gap:4px;margin-bottom:8px;">
          <button id="targetBg" style="
            flex:1;padding:5px 0;font-size:0.75rem;font-weight:600;letter-spacing:0.06em;
            border-radius:4px;border:1.5px solid var(--accent-border);cursor:pointer;
            background:var(--accent-faint);color:var(--accent);touch-action:auto;
          ">Background</button>
          <button id="targetTiles" style="
            flex:1;padding:5px 0;font-size:0.75rem;font-weight:600;letter-spacing:0.06em;
            border-radius:4px;border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;
            background:transparent;color:rgba(255,255,255,0.35);touch-action:auto;
          ">Tiles</button>
        </div>
        <div id="colorPad" style="
          position:relative;
          width:100%;
          height:90px;
          border-radius:6px;
          cursor:crosshair;
          touch-action:none;
          -webkit-user-select:none;
          user-select:none;
          background:
            linear-gradient(to bottom, rgba(255,255,255,0.82) 0%, transparent 40%, rgba(0,0,0,0.75) 100%),
            linear-gradient(to right,
              hsl(0,50%,40%),   hsl(30,50%,40%),  hsl(60,50%,40%),
              hsl(90,50%,40%),  hsl(120,50%,40%), hsl(150,50%,40%),
              hsl(180,50%,40%), hsl(210,50%,40%), hsl(240,50%,40%),
              hsl(270,50%,40%), hsl(300,50%,40%), hsl(330,50%,40%), hsl(360,50%,40%)
            );
          border: 1px solid rgba(255,255,255,0.12);
          overflow:visible;
        ">
          <div id="colorPadThumb" style="
            position:absolute;
            width:14px; height:14px;
            border-radius:50%;
            background:#fff;
            box-shadow:0 0 0 2px rgba(0,0,0,0.6), 0 2px 6px rgba(0,0,0,0.5);
            transform:translate(-50%,-50%);
            pointer-events:none;
            left:41.7%; top:50%;
          "></div>
        </div>
      </div>
      <div class="setting-item">
        <div class="setting-row" style="margin-bottom:6px;">
          <span class="setting-label" style="margin-bottom:0">Saturation</span>
          <span id="saturationVal" style="color:var(--accent-dim);font-size:0.75rem;"></span>
        </div>
        <input type="range" id="saturationSlider" min="0" max="100" value="44"
          style="width:100%;accent-color:var(--accent);cursor:pointer;touch-action:auto;">
      </div>
      <div class="setting-item setting-row">
        <span class="setting-label">Lasso</span>
        <label class="toggle-switch">
          <input type="checkbox" id="lassoToggle" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div class="setting-item setting-row">
        <span class="setting-label">Snap to grid</span>
        <label class="toggle-switch">
          <input type="checkbox" id="snapToggle">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div class="setting-item" style="display:flex;flex-direction:column;gap:6px;">
        <button id="saveBtn" style="
          width:100%;padding:7px 0;font-size:0.8rem;font-weight:600;letter-spacing:0.06em;
          border-radius:5px;border:1.5px solid var(--accent-border);cursor:pointer;
          background:var(--accent-faint);color:var(--accent);touch-action:auto;">
          Save Layout
        </button>
        <button id="restoreBtn" style="
          width:100%;padding:7px 0;font-size:0.8rem;font-weight:600;letter-spacing:0.06em;
          border-radius:5px;border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;
          background:transparent;color:rgba(255,255,255,0.45);touch-action:auto;">
          Restore Layout
        </button>
        <button id="undoBtn" style="
          width:100%;padding:7px 0;font-size:0.8rem;font-weight:600;letter-spacing:0.06em;
          border-radius:5px;border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;
          background:transparent;color:rgba(255,255,255,0.45);touch-action:auto;">
          Undo
        </button>
      </div>
    </div>
  </div>
</div>
</div>

<div id="pie-menu"><svg id="pie-svg" width="200" height="200"></svg></div>

<div id="board">
  <div id="hint">
    <div class="big">✦</div>
    <p>Type letters above<br>and tap <strong style="color:var(--accent-dim)">Add Tiles</strong></p>
    <p style="font-size:0.8rem;opacity:0.7">Drag background to lasso · Drag hole to discard</p>
  </div>
  <svg id="lasso-svg"><path id="lasso-path" d=""/></svg>
</div>
<div id="hole"></div>

<div class="info-bar">
  <span>Tiles: <strong id="tileCount">0</strong></span>
  <span>Lasso to select · Drag group · Hole to discard</span>
</div>

<script type="module" src="/src/main.ts"></script>
</body>
</html>
