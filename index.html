<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LETRSETR</title>
<style>
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  :root {
    --h: 150;
    --l: 18;
    --bg:           hsl(var(--h), 44%, var(--l, 18)%);
    --accent:       hsl(var(--h), 65%, 68%);
    --accent-dim:   hsla(var(--h), 55%, 65%, 0.5);
    --accent-faint: hsla(var(--h), 55%, 65%, 0.13);
    --accent-border:hsla(var(--h), 55%, 65%, 0.5);
    --fg-dim:       hsla(var(--h), 30%, 88%, 0.4);
    --fg-mid:       hsla(var(--h), 30%, 88%, 0.7);
    --input-bg:     hsl(var(--h), 44%, 8%);
  }

  html { height: 100%; overflow: hidden; }

  body {
    height: 100dvh;
    overflow: hidden;
    overscroll-behavior: none;
    background: var(--bg);
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    display: grid;
    grid-template-rows: 1fr auto;
  }

  #board, .tile {
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-linear-gradient(45deg,  transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px),
      repeating-linear-gradient(-45deg, transparent, transparent 2px, rgba(255,255,255,0.02) 2px, rgba(255,255,255,0.02) 4px);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: 14px 24px 10px;
    text-align: center;
    background: rgba(0,0,0,0.3);
    border-bottom: 1px solid var(--accent-dim);
  }

  header h1 {
    color: var(--accent);
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: 0.18em;
    text-shadow: 0 2px 10px rgba(0,0,0,0.5);
  }

  .subtitle {
    color: var(--fg-dim);
    font-size: 0.68rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .controls {
    position: relative;
    z-index: 10;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    justify-content: center;
    padding: 10px 14px;
    background: rgba(0,0,0,0.28);
    border-bottom: 1px solid rgba(255,255,255,0.06);
    touch-action: auto;
    -webkit-user-select: auto;
  }

  .controls label {
    color: var(--fg-mid);
    font-size: 0.8rem;
    font-weight: 600;
  }

  #letterInput {
    -webkit-user-select: text;
    user-select: text;
    touch-action: auto;
    background: var(--input-bg);
    border: 1.5px solid var(--accent-border);
    border-radius: 7px;
    color: #fff;
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.25em;
    padding: 9px 13px;
    width: 210px;
    text-transform: uppercase;
    outline: none;
    caret-color: var(--accent);
    -webkit-appearance: none;
    appearance: none;
  }

  #letterInput::placeholder {
    color: rgba(255,255,255,0.25);
    font-weight: 400;
    letter-spacing: 0.08em;
    font-size: 0.85rem;
  }

  #letterInput:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-faint);
  }

  .btn {
    touch-action: auto;
    padding: 9px 18px;
    border-radius: 7px;
    border: 1.5px solid var(--accent-border);
    background: var(--accent-faint);
    color: var(--accent);
    font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    -webkit-appearance: none;
    appearance: none;
  }

  .btn:active { opacity: 0.7; }

  .btn-clear {
    border-color: rgba(255,100,100,0.4);
    color: rgba(255,160,160,0.9);
    background: rgba(255,80,80,0.07);
  }

  #board {
    position: relative;
    z-index: 5;
    overflow: hidden;
  }

  /* ── Sliding top bar ── */
  #top-bar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 100;
    transform: translateY(0);
    transition: transform 0.32s cubic-bezier(0.4, 0, 0.2, 1);
  }

  #top-bar.hidden {
    transform: translateY(-100%);
  }

  #top-bar-tab {
    position: absolute;
    bottom: -21px;
    left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 22px;
    background: rgba(0,0,0,0.28);
    border: 1px solid var(--accent-border);
    border-top: none;
    border-radius: 0 0 12px 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    touch-action: auto;
    -webkit-user-select: none;
    user-select: none;
    z-index: 101;
  }

  #top-bar-tab::after {
    content: '';
    display: block;
    width: 18px;
    height: 3px;
    border-radius: 2px;
    background: var(--accent-dim);
    box-shadow: 0 -5px 0 var(--accent-dim);
  }

  /* ── Pie color menu ── */
  #pie-menu {
    position: fixed;
    display: none;
    z-index: 9999;
    pointer-events: none;
    touch-action: none;
  }
  #pie-menu.visible {
    display: block;
    pointer-events: all;
  }
  #pie-menu svg {
    overflow: visible;
    filter: drop-shadow(0 4px 16px rgba(0,0,0,0.55));
  }
  .pie-slice { cursor: pointer; }
  .pie-slice.hovered { opacity: 0.8; }

  .tile-tint {
    position: absolute;
    inset: 0;
    border-radius: 6px;
    pointer-events: none;
    mix-blend-mode: multiply;
    z-index: 2;
    transition: background 0.15s;
  }

  .tile {
    position: absolute;
    width: 60px;
    height: 60px;
    cursor: grab;
    border-radius: 7px;
    will-change: transform;
    transition: box-shadow 0.12s, outline 0.08s;
  }

  .tile.selected .tile-inner {
    outline: 2.5px solid var(--accent);
    outline-offset: 1px;
  }

  .tile-inner {
    width: 100%;
    height: 100%;
    background: linear-gradient(150deg, #faf2dc 0%, #f0d898 50%, #e3bc68 100%);
    border-radius: 7px;
    border: 1px solid #b08040;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.7),
      inset 0 -2px 0 rgba(0,0,0,0.08),
      2px 4px 0 #8a5c18,
      3px 7px 16px rgba(0,0,0,0.55);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
  }

  .tile-inner::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      91deg, transparent, transparent 6px,
      rgba(150,100,30,0.07) 6px, rgba(150,100,30,0.07) 7px
    );
  }

  .tile-inner::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1px solid rgba(160,110,30,0.22);
    border-radius: 5px;
  }

  .tile-letter {
    font-weight: 700;
    color: #1a0e08;
    line-height: 1;
    position: relative;
    z-index: 1;
    text-shadow: 0 1px 0 rgba(255,255,255,0.4);
  }

  .tile.dragging {
    z-index: 9999 !important;
    transition: none !important;
  }

  @keyframes fallInHole {
    0%   { transform: scale(1);    opacity: 1; }
    60%  { transform: scale(0.55) rotate(20deg); opacity: 0.7; }
    100% { transform: scale(0.05) rotate(40deg); opacity: 0; }
  }

  .tile.falling {
    animation: fallInHole 0.55s ease-in forwards;
    z-index: 9998 !important;
    pointer-events: none;
  }

  /* ── Lasso SVG overlay ── */
  #lasso-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 50;
  }

  #lasso-path {
    fill: var(--accent-faint);
    stroke: var(--accent);
    stroke-width: 1.5;
    stroke-dasharray: 5 4;
    stroke-linejoin: round;
    stroke-linecap: round;
  }

  #hint {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: rgba(212,237,218,0.15);
    pointer-events: none;
    gap: 8px;
    padding: 20px;
    text-align: center;
  }

  #hint .big { font-size: 2rem; }
  #hint p { font-size: 0.95rem; line-height: 1.9; }

  .info-bar {
    position: relative;
    z-index: 10;
    padding: 5px 20px;
    background: rgba(0,0,0,0.2);
    border-top: 1px solid rgba(255,255,255,0.05);
    display: flex;
    justify-content: center;
    gap: 20px;
    -webkit-user-select: none;
    user-select: none;
  }

  .setting-item {
    padding: 10px 18px;
    color: rgba(212,237,218,0.8);
    font-size: 0.85rem;
    cursor: default;
    letter-spacing: 0.04em;
  }

  .setting-item:hover {
    background: rgba(233,196,106,0.05);
  }

  .setting-label {
    display: block;
    color: rgba(212,237,218,0.6);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  .setting-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .setting-row .setting-label {
    margin-bottom: 0;
  }

  .toggle-switch {
    position: relative;
    display: inline-block;
    cursor: pointer;
  }

  .toggle-switch input {
    opacity: 0;
    width: 0;
    height: 0;
    position: absolute;
  }

  .toggle-track {
    display: block;
    width: 40px;
    height: 22px;
    background: rgba(255,255,255,0.12);
    border-radius: 11px;
    border: 1px solid rgba(255,255,255,0.15);
    position: relative;
    transition: background 0.2s;
  }

  .toggle-switch input:checked + .toggle-track {
    background: var(--accent-faint);
    border-color: var(--accent-border);
  }

  .toggle-thumb {
    position: absolute;
    top: 2px;
    left: 2px;
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    transition: transform 0.2s;
  }

  .toggle-switch input:checked + .toggle-track .toggle-thumb {
    transform: translateX(18px);
  }

  .info-bar span {
    color: rgba(212,237,218,0.3);
    font-size: 0.7rem;
    letter-spacing: 0.07em;
  }

  .info-bar strong { color: var(--accent-dim); }

  /* ── Hole: rim is the outer element, black interior via ::after ── */
  #hole {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    width: 88px;
    height: 52px;
    border-radius: 50%;
    /* Rim gradient: bright near edge (top) → dark far edge (bottom) */
    background: linear-gradient(to bottom,
      var(--hole-rim-top) 0%,
      var(--hole-rim-mid) 22%,
      var(--hole-rim-low) 55%,
      #050200 85%,
      #000 100%
    );
    z-index: 4;
    pointer-events: none;
    transition: transform 0.2s;
    /* No drop shadow */
    box-shadow: none;
  }

  /* Pure black hole interior, slightly inset and nudged down to show more rim at top */
  #hole::after {
    content: '';
    position: absolute;
    top: 7px;
    left: 7px;
    right: 7px;
    bottom: 3px;
    border-radius: 50%;
    background: #000;
    box-shadow: inset 0 4px 18px rgba(0,0,0,0.9);
  }

  #hole::before { display: none; }

  #hole.active {
    transform: translateX(-50%) scale(1.1);
    background: linear-gradient(to bottom,
      var(--hole-rim-top) 0%,
      var(--hole-rim-mid) 22%,
      var(--hole-rim-low) 55%,
      #050200 85%,
      #000 100%
    );
    filter: brightness(1.25);
  }
</style>
</head>
<body>

<div id="top-bar">
<div id="top-bar-tab"></div>
<header>
  <h1>LETRSETR12</h1>
  <p class="subtitle">Type · Drag · Arrange</p>
</header>

<div class="controls">
  <label for="letterInput">Letters:</label>
  <input type="text" id="letterInput" placeholder="e.g. ANAGRAM" maxlength="60"
    autocomplete="off" autocorrect="off" autocapitalize="characters" spellcheck="false"/>
  <button class="btn" id="addBtn">Add Tiles</button>
  <button class="btn btn-clear" id="clearBtn">Clear</button>
  <input type="range" id="sizeSlider" min="30" max="96" value="60"
    style="width:90px;accent-color:#e9c46a;touch-action:auto;cursor:pointer;">
  <div style="position:relative;">
    <button id="gearBtn" style="
      padding:9px 12px;font-size:2.2rem;line-height:1;
      background:none;border:none;color:var(--accent-dim);
      cursor:pointer;touch-action:auto;
    " aria-label="Settings">⚙︎</button>
    <div id="settingsPanel" style="
      display:none;
      position:absolute;
      top:calc(100% + 8px);
      right:0;
      min-width:220px;
      background:rgba(40,40,40,0.82);
      backdrop-filter:blur(14px);
      -webkit-backdrop-filter:blur(14px);
      border:1px solid var(--accent-border);
      border-radius:10px;
      box-shadow:0 8px 32px rgba(0,0,0,0.5);
      padding:12px 0 8px;
      z-index:200;
    ">
      <div class="setting-item" style="-webkit-user-select:none;user-select:none;">
        <div id="colorTargetToggle" style="display:flex;gap:4px;margin-bottom:8px;">
          <button id="targetBg" style="
            flex:1;padding:5px 0;font-size:0.75rem;font-weight:600;letter-spacing:0.06em;
            border-radius:4px;border:1.5px solid var(--accent-border);cursor:pointer;
            background:var(--accent-faint);color:var(--accent);touch-action:auto;
          ">Background</button>
          <button id="targetTiles" style="
            flex:1;padding:5px 0;font-size:0.75rem;font-weight:600;letter-spacing:0.06em;
            border-radius:4px;border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;
            background:transparent;color:rgba(255,255,255,0.35);touch-action:auto;
          ">Tiles</button>
        </div>
        <div id="colorPad" style="
          position:relative;
          width:100%;
          height:90px;
          border-radius:6px;
          cursor:crosshair;
          touch-action:none;
          -webkit-user-select:none;
          user-select:none;
          background:
            linear-gradient(to bottom, rgba(255,255,255,0.82) 0%, transparent 40%, rgba(0,0,0,0.75) 100%),
            linear-gradient(to right,
              hsl(0,50%,40%),   hsl(30,50%,40%),  hsl(60,50%,40%),
              hsl(90,50%,40%),  hsl(120,50%,40%), hsl(150,50%,40%),
              hsl(180,50%,40%), hsl(210,50%,40%), hsl(240,50%,40%),
              hsl(270,50%,40%), hsl(300,50%,40%), hsl(330,50%,40%), hsl(360,50%,40%)
            );
          border: 1px solid rgba(255,255,255,0.12);
          overflow:visible;
        ">
          <div id="colorPadThumb" style="
            position:absolute;
            width:14px; height:14px;
            border-radius:50%;
            background:#fff;
            box-shadow:0 0 0 2px rgba(0,0,0,0.6), 0 2px 6px rgba(0,0,0,0.5);
            transform:translate(-50%,-50%);
            pointer-events:none;
            left:41.7%; top:50%;
          "></div>
        </div>
      </div>
      <div class="setting-item">
        <div class="setting-row" style="margin-bottom:6px;">
          <span class="setting-label" style="margin-bottom:0">Saturation</span>
          <span id="saturationVal" style="color:var(--accent-dim);font-size:0.75rem;"></span>
        </div>
        <input type="range" id="saturationSlider" min="0" max="100" value="44"
          style="width:100%;accent-color:var(--accent);cursor:pointer;touch-action:auto;">
      </div>
      <div class="setting-item setting-row">
        <span class="setting-label">Lasso</span>
        <label class="toggle-switch">
          <input type="checkbox" id="lassoToggle" checked>
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div class="setting-item setting-row">
        <span class="setting-label">Snap to grid</span>
        <label class="toggle-switch">
          <input type="checkbox" id="snapToggle">
          <span class="toggle-track"><span class="toggle-thumb"></span></span>
        </label>
      </div>
      <div class="setting-item" style="display:flex;flex-direction:column;gap:6px;">
        <button id="saveBtn" style="
          width:100%;padding:7px 0;font-size:0.8rem;font-weight:600;letter-spacing:0.06em;
          border-radius:5px;border:1.5px solid var(--accent-border);cursor:pointer;
          background:var(--accent-faint);color:var(--accent);touch-action:auto;">
          Save Layout
        </button>
        <button id="restoreBtn" style="
          width:100%;padding:7px 0;font-size:0.8rem;font-weight:600;letter-spacing:0.06em;
          border-radius:5px;border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;
          background:transparent;color:rgba(255,255,255,0.45);touch-action:auto;">
          Restore Layout
        </button>
        <button id="undoBtn" style="
          width:100%;padding:7px 0;font-size:0.8rem;font-weight:600;letter-spacing:0.06em;
          border-radius:5px;border:1.5px solid rgba(255,255,255,0.15);cursor:pointer;
          background:transparent;color:rgba(255,255,255,0.45);touch-action:auto;">
          Undo
        </button>
      </div>
    </div>
  </div>
</div>
</div>

<div id="pie-menu"><svg id="pie-svg" width="200" height="200"></svg></div>

<div id="board">
  <div id="hint">
    <div class="big">✦</div>
    <p>Type letters above<br>and tap <strong style="color:var(--accent-dim)">Add Tiles</strong></p>
    <p style="font-size:0.8rem;opacity:0.7">Drag background to lasso · Drag hole to discard</p>
  </div>
  <svg id="lasso-svg"><path id="lasso-path" d=""/></svg>
</div>
<div id="hole"></div>

<div class="info-bar">
  <span>Tiles: <strong id="tileCount">0</strong></span>
  <span>Lasso to select · Drag group · Hole to discard</span>
</div>

<script>
(function () {
  var board     = document.getElementById('board');
  var input     = document.getElementById('letterInput');
  var addBtn    = document.getElementById('addBtn');
  var clearBtn  = document.getElementById('clearBtn');
  var hint      = document.getElementById('hint');
  var hole      = document.getElementById('hole');
  var tileCount = document.getElementById('tileCount');
  var lassoSvg  = document.getElementById('lasso-svg');
  var lassoPath = document.getElementById('lasso-path');

  var tiles     = [];
  var selected  = [];
  var dragging  = null;
  var dragOffX  = 0, dragOffY = 0;
  var topZ      = 20;
  var tileSize  = 60;

  // ── Undo history ──
  var undoStack = [];
  var MAX_UNDO  = 20;

  function snapshotForUndo() {
    var snap = tiles.map(function(t) {
      return {
        letter: t.querySelector('.tile-letter').textContent,
        left:   t.style.left,
        top:    t.style.top,
        rot:    parseFloat(t.dataset.baseRot || 0)
      };
    });
    undoStack.push(snap);
    if (undoStack.length > MAX_UNDO) undoStack.shift();
  }

  function applyUndo() {
    if (!undoStack.length) return;
    var snap = undoStack.pop();
    clearSelection();
    tiles.forEach(function(t) { t.remove(); });
    tiles = [];
    snap.forEach(function(s) {
      makeTile(s.letter || '_', parseFloat(s.left), parseFloat(s.top));
      // Restore exact rotation
      var t = tiles[tiles.length - 1];
      t.dataset.baseRot  = s.rot;
      t.style.transform  = 'rotate(' + s.rot + 'deg)';
    });
    updateHint();
  }

  // Snap-to-grid
  var snapEnabled = false;

  function snapPos(v) {
    if (!snapEnabled) return v;
    var grid = tileSize + 4;
    return Math.round(v / grid) * grid;
  }
  var lassoing    = false;
  var lassoPoints = [];

  function updateHint() {
    hint.style.display = tiles.length === 0 ? 'flex' : 'none';
    tileCount.textContent = tiles.length;
  }

  function clearSelection() {
    selected.forEach(function(t) { t.classList.remove('selected'); });
    selected = [];
  }

  // ── Point-in-polygon (ray casting) ──
  function pointInPoly(px, py, poly) {
    var inside = false;
    for (var i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      var xi = poly[i][0], yi = poly[i][1];
      var xj = poly[j][0], yj = poly[j][1];
      if (((yi > py) !== (yj > py)) &&
          (px < (xj - xi) * (py - yi) / (yj - yi) + xi)) {
        inside = !inside;
      }
    }
    return inside;
  }

  function tileCentreInPoly(el, poly) {
    var br  = board.getBoundingClientRect();
    var cx  = parseFloat(el.style.left) + tileSize / 2;
    var cy  = parseFloat(el.style.top)  + tileSize / 2;
    return pointInPoly(cx, cy, poly);
  }

  function buildPathD(pts) {
    if (pts.length < 2) return '';
    var d = 'M' + pts[0][0] + ',' + pts[0][1];
    for (var i = 1; i < pts.length; i++) {
      d += ' L' + pts[i][0] + ',' + pts[i][1];
    }
    d += ' Z';
    return d;
  }

  // ── Board background pointer events (lasso) ──
  board.addEventListener('pointerdown', function(e) {
    // Only start lasso if the target is the board itself (not a tile)
    if (e.target !== board && e.target !== lassoSvg &&
        e.target !== lassoPath && e.target !== hint &&
        !e.target.closest('#hint') && e.target !== hole &&
        e.target.id !== 'hole-label') return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    if (!lassoEnabled) return;

    clearSelection();
    lassoing    = true;
    lassoPoints = [];

    var br = board.getBoundingClientRect();
    lassoPoints.push([e.clientX - br.left, e.clientY - br.top]);
    lassoPath.setAttribute('d', '');
    board.setPointerCapture(e.pointerId);
    e.preventDefault();
  });

  board.addEventListener('pointermove', function(e) {
    if (!lassoing) return;
    var br = board.getBoundingClientRect();
    lassoPoints.push([e.clientX - br.left, e.clientY - br.top]);
    // Thin the points a little for performance
    if (lassoPoints.length > 3) {
      lassoPath.setAttribute('d', buildPathD(lassoPoints));
    }
    e.preventDefault();
  });

  board.addEventListener('pointerup', function(e) {
    if (!lassoing) return;
    lassoing = false;
    lassoPath.setAttribute('d', '');

    if (lassoPoints.length < 6) return; // too small a gesture

    // Select tiles whose centre falls inside the lasso polygon
    clearSelection();
    tiles.forEach(function(t) {
      if (tileCentreInPoly(t, lassoPoints)) {
        t.classList.add('selected');
        selected.push(t);
      }
    });
    lassoPoints = [];
  });

  // ── Hole helpers ──
  function tileOverHole(el) {
    var tr = el.getBoundingClientRect();
    var hr = hole.getBoundingClientRect();
    var tileCX = tr.left + tr.width  / 2;
    var tileCY = tr.top  + tr.height / 2;
    var holeCX = hr.left + hr.width  / 2;
    var holeCY = hr.top  + hr.height / 2;
    var dx = (tileCX - holeCX) / (hr.width  * 0.6);
    var dy = (tileCY - holeCY) / (hr.height * 0.6);
    return (dx * dx + dy * dy) < 1;
  }

  function dropIntoHole(el) {
    var br    = board.getBoundingClientRect();
    var hr    = hole.getBoundingClientRect();
    var holeCX = hr.left + hr.width  / 2 - br.left;
    var holeCY = hr.top  + hr.height / 2 - br.top;
    el.style.left = (holeCX - tileSize / 2) + 'px';
    el.style.top  = (holeCY - tileSize / 2) + 'px';
    el.style.transform  = 'rotate(0deg)';
    el.style.transition = 'none';
    el.classList.remove('dragging', 'selected');
    el.classList.add('falling');
    el.style.zIndex = '9998';
    el.addEventListener('animationend', function() {
      el.remove();
      tiles    = tiles.filter(function(t) { return t !== el; });
      selected = selected.filter(function(t) { return t !== el; });
      updateHint();
    }, { once: true });
  }

  // ── Make tile ──
  function makeTile(letter, x, y) {
    var upper   = letter.toUpperCase();
    var isBlank = (upper === ' ' || letter === '_');

    var el = document.createElement('div');
    el.className    = 'tile';
    el.style.width  = tileSize + 'px';
    el.style.height = tileSize + 'px';
    el.style.left   = x + 'px';
    el.style.top    = y + 'px';

    var inner = document.createElement('div');
    inner.className = 'tile-inner';
    inner.style.filter = getTileFilter();

    var tintDiv = document.createElement('div');
    tintDiv.className = 'tile-tint';
    inner.appendChild(tintDiv);

    var span = document.createElement('span');
    span.className      = 'tile-letter';
    span.style.fontSize = (tileSize * 0.55) + 'px';
    span.textContent    = isBlank ? '' : upper;

    inner.appendChild(span);
    el.appendChild(inner);

    var rot = (Math.random() - 0.5) * 7;
    el.style.transform  = 'rotate(' + rot + 'deg)';
    el.dataset.baseRot  = rot;
    el.style.transition = 'box-shadow 0.12s';

    // ── Per-tile drag start positions (for group move) ──
    var groupStartPositions = [];

    // Long-press to open pie color menu
    var longPressTimer = null;
    el.addEventListener('pointerdown', function(e) {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      var pointerId = e.pointerId;
      longPressTimer = setTimeout(function() {
        longPressTimer = null;
        // Cancel drag and release capture so pie gets events
        dragging = null;
        el.classList.remove('dragging');
        el.style.transform = 'rotate(' + rot + 'deg)';
        el.style.boxShadow = '';
        try { el.releasePointerCapture(pointerId); } catch(ex) {}
        showPieMenu(el, e.clientX, e.clientY);
      }, 500);
    });
    el.addEventListener('pointerup',     function() { clearTimeout(longPressTimer); longPressTimer = null; });
    el.addEventListener('pointermove',   function() { clearTimeout(longPressTimer); longPressTimer = null; });
    el.addEventListener('pointercancel', function() { clearTimeout(longPressTimer); longPressTimer = null; });

    // Prevent iOS magnifier, text selection, and context menu on tiles
    el.addEventListener('touchstart',  function(e) { e.preventDefault(); }, { passive: false });
    el.addEventListener('contextmenu', function(e) { e.preventDefault(); });

    el.addEventListener('pointerdown', function(e) {
      if (e.pointerType === 'mouse' && e.button !== 0) return;
      e.preventDefault();
      e.stopPropagation();
      input.blur();

      // If this tile isn't selected, clear selection and select only this one
      if (!el.classList.contains('selected')) {
        clearSelection();
      }

      dragging = el;
      snapshotForUndo();
      el.style.zIndex = String(++topZ);

      var r    = el.getBoundingClientRect();
      dragOffX = e.clientX - r.left;
      dragOffY = e.clientY - r.top;

      el.classList.add('dragging');
      el.style.transform = 'rotate(' + (rot + 3) + 'deg) scale(1.08)';
      el.style.boxShadow = '0 18px 40px rgba(0,0,0,0.6)';

      // Record start positions of all selected tiles for group drag
      groupStartPositions = selected.map(function(t) {
        return { tile: t, x: parseFloat(t.style.left), y: parseFloat(t.style.top) };
      });
      // Also record the lead tile's start
      var leadStart = { x: parseFloat(el.style.left), y: parseFloat(el.style.top) };
      el._leadStart = leadStart;

      el.setPointerCapture(e.pointerId);
    });

    el.addEventListener('pointermove', function(e) {
      if (dragging !== el) return;
      e.preventDefault();

      var br  = board.getBoundingClientRect();
      var nx  = Math.max(0, Math.min(br.width  - tileSize - 4, e.clientX - br.left - dragOffX));
      var ny  = Math.max(0, Math.min(br.height - tileSize - 4, e.clientY - br.top  - dragOffY));

      var dx = nx - el._leadStart.x;
      var dy = ny - el._leadStart.y;

      el.style.left = nx + 'px';
      el.style.top  = ny + 'px';

      // Move all other selected tiles by the same delta
      groupStartPositions.forEach(function(rec) {
        if (rec.tile === el) return;
        rec.tile.style.left = Math.max(0, Math.min(br.width  - tileSize - 4, rec.x + dx)) + 'px';
        rec.tile.style.top  = Math.max(0, Math.min(br.height - tileSize - 4, rec.y + dy)) + 'px';
      });

      hole.classList.toggle('active', tileOverHole(el));
    });

    function endDrag() {
      if (dragging !== el) return;
      dragging = null;
      hole.classList.remove('active');

      if (tileOverHole(el)) {
        // Drop all selected into hole, or just this one
        var toDiscard = selected.length > 0 ? selected.slice() : [el];
        clearSelection();
        toDiscard.forEach(function(t) { dropIntoHole(t); });
        return;
      }

      el.classList.remove('dragging');
      el.style.transform = 'rotate(' + rot + 'deg)';
      el.style.boxShadow = '';
      separateTiles(tileSize);
    }

    el.addEventListener('pointerup',     endDrag);
    el.addEventListener('pointercancel', endDrag);
    el.addEventListener('dblclick', function(e) { e.preventDefault(); });

    board.appendChild(el);
    tiles.push(el);
    updateHint();
  }

  // ── Add tiles ──
  function addTiles() {
    var text = input.value;
    if (!text || !text.trim()) return;
    snapshotForUndo();

    var br     = board.getBoundingClientRect();
    var boardW = br.width  || 360;
    var boardH = br.height || 480;
    var tileW  = tileSize + 8, tileH = tileSize + 8, pad = 14;
    var cols   = Math.max(1, Math.floor((boardW - pad * 2) / tileW));

    // Count incoming chars to calculate total rows, then center vertically
    var chars = [];
    for (var i = 0; i < text.length; i++) { if (text[i] !== '\n') chars.push(text[i]); }
    var totalRows  = Math.ceil(chars.length / cols);
    var blockH     = totalRows * tileH;
    var startY     = Math.max(pad, Math.round((boardH - blockH) / 2));

    for (var j = 0; j < chars.length; j++) {
      var row = Math.floor(j / cols);
      var col = j % cols;
      var x   = pad + col * tileW + (Math.random() - 0.5) * 4;
      var y   = startY + row * tileH + (Math.random() - 0.5) * 4;
      x = Math.min(x, boardW - tileSize - pad);
      y = Math.min(y, boardH - tileSize - pad);
      makeTile(chars[j], x, y);
    }
    input.value = '';
    separateTiles(tileSize);
  }

  function onAdd(e) { e.preventDefault(); e.stopPropagation(); addTiles(); }
  addBtn.addEventListener('pointerdown', onAdd);
  addBtn.addEventListener('click',       onAdd);

  input.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') { e.preventDefault(); addTiles(); }
  });

  function onClear(e) {
    e.preventDefault(); e.stopPropagation();
    snapshotForUndo();
    clearSelection();
    tiles.forEach(function(t) { t.remove(); });
    tiles = [];
    updateHint();
  }
  clearBtn.addEventListener('pointerdown', onClear);
  clearBtn.addEventListener('click',       onClear);

  // ── Size slider ──
  var sizeSlider = document.getElementById('sizeSlider');

  sizeSlider.addEventListener('input', function() {
    var newVal = parseInt(this.value);

    if (newVal < tileSize) {
      // Zooming out: scale tile positions from board center, then resize
      var ratio  = newVal / tileSize;
      var br     = board.getBoundingClientRect();
      var cx     = br.width  / 2;
      var cy     = br.height / 2;
      tiles.forEach(function(t) {
        var ox = parseFloat(t.style.left);
        var oy = parseFloat(t.style.top);
        t.style.left = (cx + (ox - cx) * ratio) + 'px';
        t.style.top  = (cy + (oy - cy) * ratio) + 'px';
        t.style.width  = newVal + 'px';
        t.style.height = newVal + 'px';
        t.querySelector('.tile-letter').style.fontSize = (newVal * 0.55) + 'px';
      });
      tileSize = newVal;

    } else if (newVal > tileSize) {
      // Zooming in: resize, then separate overlapping tiles from group center
      var br2   = board.getBoundingClientRect();
      var boardW = br2.width, boardH = br2.height;
      var pad   = 4;

      // Save positions in case we need to revert
      var saved = tiles.map(function(t) {
        return { left: t.style.left, top: t.style.top };
      });

      // Apply new size
      tiles.forEach(function(t) {
        t.style.width  = newVal + 'px';
        t.style.height = newVal + 'px';
        t.querySelector('.tile-letter').style.fontSize = (newVal * 0.55) + 'px';
      });

      if (!separateTiles(newVal, boardW, boardH)) {
        // Revert tiles and slider — board too small for this size
        tiles.forEach(function(t, idx) {
          t.style.left   = saved[idx].left;
          t.style.top    = saved[idx].top;
          t.style.width  = tileSize + 'px';
          t.style.height = tileSize + 'px';
          t.querySelector('.tile-letter').style.fontSize = (tileSize * 0.55) + 'px';
        });
        this.value = tileSize;
        return;
      }

      tileSize = newVal;
    }

  });

  // ── Tile separation helper ──
  // Pushes all tiles apart until none overlap, clamped to board bounds.
  // Returns true if separation succeeded, false if board is too small.
  function separateTiles(sz, boardW, boardH) {
    var pad     = 4;
    var minDist = sz + pad;
    var MAX_ITER = 60;
    var bw = boardW || board.getBoundingClientRect().width;
    var bh = boardH || board.getBoundingClientRect().height;

    for (var iter = 0; iter < MAX_ITER; iter++) {
      var moved = false;

      // Group center for coincident-tile fallback
      var gcx = 0, gcy = 0;
      tiles.forEach(function(t) {
        gcx += parseFloat(t.style.left) + sz / 2;
        gcy += parseFloat(t.style.top)  + sz / 2;
      });
      gcx /= tiles.length || 1;
      gcy /= tiles.length || 1;

      for (var i = 0; i < tiles.length; i++) {
        for (var j = i + 1; j < tiles.length; j++) {
          var ax = parseFloat(tiles[i].style.left) + sz / 2;
          var ay = parseFloat(tiles[i].style.top)  + sz / 2;
          var bx = parseFloat(tiles[j].style.left) + sz / 2;
          var by = parseFloat(tiles[j].style.top)  + sz / 2;
          var dx = bx - ax, dy = by - ay;
          var dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < minDist) {
            // Coincident fallback: push from group center
            if (dist < 0.5) {
              dx = ax - gcx || 0.1; dy = ay - gcy || 0.1;
              dist = Math.sqrt(dx * dx + dy * dy) || 0.1;
            }
            // Axis-align: push only along dominant axis
            var overlapH = minDist - Math.abs(dx);
            var overlapV = minDist - Math.abs(dy);
            var ux, uy;
            if (Math.abs(dx) >= Math.abs(dy)) {
              // More side-by-side horizontally → push horizontally
              ux = (overlapH / 2) * (dx >= 0 ? 1 : -1);
              uy = 0;
            } else {
              // More side-by-side vertically → push vertically
              ux = 0;
              uy = (overlapV / 2) * (dy >= 0 ? 1 : -1);
            }
            tiles[i].style.left = (parseFloat(tiles[i].style.left) - ux) + 'px';
            tiles[i].style.top  = (parseFloat(tiles[i].style.top)  - uy) + 'px';
            tiles[j].style.left = (parseFloat(tiles[j].style.left) + ux) + 'px';
            tiles[j].style.top  = (parseFloat(tiles[j].style.top)  + uy) + 'px';
            moved = true;
          }
        }
      }

      // Clamp to board bounds
      tiles.forEach(function(t) {
        t.style.left = Math.max(0, Math.min(bw - sz - pad, parseFloat(t.style.left))) + 'px';
        t.style.top  = Math.max(0, Math.min(bh - sz - pad, parseFloat(t.style.top)))  + 'px';
      });

      if (!moved) break;
    }

    // Check if any overlaps remain
    var fits = true;
    outer: for (var ii = 0; ii < tiles.length; ii++) {
      for (var jj = ii + 1; jj < tiles.length; jj++) {
        var ax2 = parseFloat(tiles[ii].style.left) + sz / 2;
        var ay2 = parseFloat(tiles[ii].style.top)  + sz / 2;
        var bx2 = parseFloat(tiles[jj].style.left) + sz / 2;
        var by2 = parseFloat(tiles[jj].style.top)  + sz / 2;
        var dx2 = bx2 - ax2, dy2 = by2 - ay2;
        if (Math.sqrt(dx2 * dx2 + dy2 * dy2) < minDist - 1) {
          fits = false; break outer;
        }
      }
    }
    // If snap is on, align every tile to grid after separation
    if (snapEnabled) {
      var grid = sz + 4;
      tiles.forEach(function(t) {
        t.style.left = (Math.round(parseFloat(t.style.left) / grid) * grid) + 'px';
        t.style.top  = (Math.round(parseFloat(t.style.top)  / grid) * grid) + 'px';
      });
    }
    return fits;
  }

  // ── Color target (bg vs tiles) ──
  var colorTarget = 'bg';

  var currentTileHR  = 0;
  var currentTileBR  = 1.0;
  var currentTileSat = 1.0;
  try {
    var thr = localStorage.getItem('letrsetr_thr');
    var tbr = localStorage.getItem('letrsetr_tbr');
    var tsa = localStorage.getItem('letrsetr_tsat');
    if (thr !== null) currentTileHR  = parseFloat(thr);
    if (tbr !== null) currentTileBR  = parseFloat(tbr);
    if (tsa !== null) currentTileSat = parseFloat(tsa);
  } catch(e) {}

  function getTileFilter() {
    return 'hue-rotate(' + currentTileHR + 'deg) brightness(' + currentTileBR + ') saturate(' + currentTileSat + ')';
  }

  function applyTileFilter(hr, br, sat) {
    currentTileHR  = hr;
    currentTileBR  = br;
    currentTileSat = sat;
    try {
      localStorage.setItem('letrsetr_thr',  hr);
      localStorage.setItem('letrsetr_tbr',  br);
      localStorage.setItem('letrsetr_tsat', sat);
    } catch(e) {}
    var f = getTileFilter();
    tiles.forEach(function(t) { t.querySelector('.tile-inner').style.filter = f; });
  }

  // ── Theme engine ──
  var savedH = 150, savedL = 18, savedS = 44;
  try {
    var sh = localStorage.getItem('letrsetr_h');
    var sl = localStorage.getItem('letrsetr_l');
    var ss = localStorage.getItem('letrsetr_s');
    if (sh !== null) savedH = parseInt(sh);
    if (sl !== null) savedL = parseInt(sl);
    if (ss !== null) savedS = parseInt(ss);
  } catch(e) {}
  var currentH = savedH, currentL = savedL, currentS = savedS;

  function applyTheme(h, l, s) {
    if (s === undefined) s = currentS;
    currentH = h; currentL = l; currentS = s;
    try { localStorage.setItem('letrsetr_h', h); localStorage.setItem('letrsetr_l', l); localStorage.setItem('letrsetr_s', s); } catch(e) {}
    var root = document.documentElement;
    root.style.setProperty('--h', h);
    root.style.setProperty('--bg',            'hsl(' + h + ',' + s + '%,' + l + '%)');
    root.style.setProperty('--accent',        'hsl(' + h + ',65%,68%)');
    root.style.setProperty('--accent-dim',    'hsla(' + h + ',55%,65%,0.5)');
    root.style.setProperty('--accent-faint',  'hsla(' + h + ',55%,65%,0.13)');
    root.style.setProperty('--accent-border', 'hsla(' + h + ',55%,65%,0.5)');
    root.style.setProperty('--fg-dim',        'hsla(' + h + ',30%,88%,0.4)');
    root.style.setProperty('--fg-mid',        'hsla(' + h + ',30%,88%,0.7)');
    root.style.setProperty('--input-bg',      'hsl(' + h + ',' + s + '%,' + Math.max(4, l - 10) + '%)');
    root.style.setProperty('--hole-rim-top',  'hsl(' + h + ',' + Math.min(s + 20, 100) + '%,55%)');
    root.style.setProperty('--hole-rim-mid',  'hsl(' + h + ',' + s + '%,28%)');
    root.style.setProperty('--hole-rim-low',  'hsl(' + h + ',' + Math.max(s - 10, 0) + '%,8%)');    document.body.style.background = 'hsl(' + h + ',' + s + '%,' + l + '%)';
    document.getElementById('sizeSlider').style.accentColor = 'hsl(' + h + ',65%,68%)';
  }

  // ── 2D Color Pad ──
  (function() {
    var pad        = document.getElementById('colorPad');
    var thumb      = document.getElementById('colorPadThumb');
    var isDragging = false;
    var L_TOP = 65, L_BOT = 5;   // bg lightness range
    var BR_TOP = 1.6, BR_BOT = 0.3; // tile brightness range

    // Independent thumb positions per target
    var tileThumbX = 0, tileThumbY = 0; // px, set when switching or dragging

    function hlFromPos(cx, cy) {
      var w = pad.offsetWidth, h = pad.offsetHeight;
      cx = Math.max(0, Math.min(w, cx));
      cy = Math.max(0, Math.min(h, cy));
      return {
        h: Math.round((cx / w) * 360),
        l: Math.round(L_TOP - (cy / h) * (L_TOP - L_BOT))
      };
    }

    function tileValFromPos(cx, cy) {
      var w = pad.offsetWidth, h = pad.offsetHeight;
      cx = Math.max(0, Math.min(w, cx));
      cy = Math.max(0, Math.min(h, cy));
      return {
        hr: Math.round((cx / w) * 360),
        br: parseFloat((BR_TOP - (cy / h) * (BR_TOP - BR_BOT)).toFixed(2))
      };
    }

    function posFromHL(h, l) {
      var w = pad.offsetWidth, ph = pad.offsetHeight;
      return {
        x: Math.max(0, Math.min(w,  (h / 360) * w)),
        y: Math.max(0, Math.min(ph, ((L_TOP - l) / (L_TOP - L_BOT)) * ph))
      };
    }

    function posFromTile(hr, br) {
      var w = pad.offsetWidth, ph = pad.offsetHeight;
      return {
        x: Math.max(0, Math.min(w,  (hr / 360) * w)),
        y: Math.max(0, Math.min(ph, ((BR_TOP - br) / (BR_TOP - BR_BOT)) * ph))
      };
    }

    window.updatePadThumb = function() {
      var p;
      if (colorTarget === 'tiles') {
        p = posFromTile(currentTileHR, currentTileBR);
      } else {
        p = posFromHL(currentH, currentL);
      }
      thumb.style.left = p.x + 'px';
      thumb.style.top  = p.y + 'px';
    };

    function onMove(e) {
      if (!isDragging) return;
      var r  = pad.getBoundingClientRect();
      var cx = (e.touches ? e.touches[0].clientX : e.clientX) - r.left;
      var cy = (e.touches ? e.touches[0].clientY : e.clientY) - r.top;
      var tx = Math.max(0, Math.min(pad.offsetWidth,  cx));
      var ty = Math.max(0, Math.min(pad.offsetHeight, cy));
      thumb.style.left = tx + 'px';
      thumb.style.top  = ty + 'px';

      if (colorTarget === 'tiles') {
        var tv = tileValFromPos(cx, cy);
        tileThumbX = tx; tileThumbY = ty;
        applyTileFilter(tv.hr, tv.br, currentTileSat);
      } else {
        var hl = hlFromPos(cx, cy);
        applyTheme(hl.h, hl.l);
      }
      e.stopPropagation();
    }

    pad.addEventListener('pointerdown', function(e) {
      isDragging = true;
      pad.setPointerCapture(e.pointerId);
      onMove(e);
      e.stopPropagation();
    });
    pad.addEventListener('pointermove', function(e) { onMove(e); });
    pad.addEventListener('pointerup',   function(e) { isDragging = false; e.stopPropagation(); });

    document.getElementById('gearBtn').addEventListener('click', function() {
      // thumb sync now handled in main gearBtn click handler
    });
  }());

  // ── Snap toggle ──
  var snapToggle = document.getElementById('snapToggle');

  function snapAllTiles() {
    if (!snapEnabled) return;
    var grid = tileSize + 4;
    tiles.forEach(function(t) {
      t.style.left = (Math.round(parseFloat(t.style.left) / grid) * grid) + 'px';
      t.style.top  = (Math.round(parseFloat(t.style.top)  / grid) * grid) + 'px';
    });
  }

  snapToggle.addEventListener('change', function() {
    snapEnabled = this.checked;
    if (snapEnabled) { snapAllTiles(); separateTiles(tileSize); }
  });

  // ── Save / Restore layout ──
  document.getElementById('saveBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    var layout = tiles.map(function(t) {
      return {
        letter: t.querySelector('.tile-letter').textContent || '_',
        left:   t.style.left,
        top:    t.style.top,
        rot:    parseFloat(t.dataset.baseRot || 0)
      };
    });
    try {
      localStorage.setItem('letrsetr_layout', JSON.stringify({ size: tileSize, tiles: layout }));
      this.textContent = 'Saved ✓';
      var btn = this;
      setTimeout(function() { btn.textContent = 'Save Layout'; }, 1500);
    } catch(err) {}
  });

  document.getElementById('restoreBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    var raw;
    try { raw = localStorage.getItem('letrsetr_layout'); } catch(err) {}
    if (!raw) return;
    var data = JSON.parse(raw);
    snapshotForUndo();
    clearSelection();
    tiles.forEach(function(t) { t.remove(); });
    tiles = [];
    tileSize = data.size || tileSize;
    document.getElementById('sizeSlider').value = tileSize;
    data.tiles.forEach(function(s) {
      makeTile(s.letter || '_', parseFloat(s.left), parseFloat(s.top));
      var t = tiles[tiles.length - 1];
      t.dataset.baseRot = s.rot;
      t.style.transform = 'rotate(' + s.rot + 'deg)';
    });
    updateHint();
  });

  // ── Undo ──
  document.getElementById('undoBtn').addEventListener('click', function(e) {
    e.stopPropagation();
    applyUndo();
  });

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') {
      e.preventDefault();
      applyUndo();
    }
  });
  // ── Lasso toggle ──
  var lassoEnabled = true;
  var lassoToggle  = document.getElementById('lassoToggle');
  lassoToggle.addEventListener('change', function() {
    lassoEnabled = this.checked;
    lassoSvg.style.display = lassoEnabled ? '' : 'none';
  });

  // ── Saturation slider ──
  var saturationSlider = document.getElementById('saturationSlider');
  var saturationVal    = document.getElementById('saturationVal');

  function syncSaturationSlider() {
    if (colorTarget === 'tiles') {
      saturationSlider.value = Math.round(currentTileSat * 50);
      saturationVal.textContent = Math.round(currentTileSat * 100) + '%';
    } else {
      saturationSlider.value = currentS;
      saturationVal.textContent = currentS + '%';
    }
    saturationSlider.style.accentColor = 'hsl(' + currentH + ',65%,68%)';
  }

  saturationSlider.addEventListener('input', function() {
    if (colorTarget === 'tiles') {
      var sat = parseFloat((parseInt(this.value) / 50).toFixed(2));
      applyTileFilter(currentTileHR, currentTileBR, sat);
      saturationVal.textContent = Math.round(sat * 100) + '%';
    } else {
      applyTheme(currentH, currentL, parseInt(this.value));
      saturationVal.textContent = this.value + '%';
    }
  });

  // ── Color target buttons ──
  var targetBgBtn    = document.getElementById('targetBg');
  var targetTilesBtn = document.getElementById('targetTiles');

  function setColorTarget(t) {
    colorTarget = t;
    var activeStyle   = 'background:var(--accent-faint);color:var(--accent);border-color:var(--accent-border);';
    var inactiveStyle = 'background:transparent;color:rgba(255,255,255,0.35);border-color:rgba(255,255,255,0.15);';
    targetBgBtn.style.cssText    += (t === 'bg'    ? activeStyle : inactiveStyle);
    targetTilesBtn.style.cssText += (t === 'tiles' ? activeStyle : inactiveStyle);
    syncSaturationSlider();
    setTimeout(updatePadThumb, 10);
  }

  targetBgBtn.addEventListener('click',    function(e) { e.stopPropagation(); setColorTarget('bg'); });
  targetTilesBtn.addEventListener('click', function(e) { e.stopPropagation(); setColorTarget('tiles'); });

  // Apply saved/default theme immediately on load
  applyTheme(currentH, currentL, currentS);
  applyTileFilter(currentTileHR, currentTileBR, currentTileSat);
  syncSaturationSlider();

  // Patch lasso pointerdown to respect toggle
  // (wrap the existing handler via a flag checked inside the handler)
  // The flag `lassoEnabled` is checked at the top of the board pointerdown handler below.

  // ── Gear / settings dropdown ──
  var gearBtn       = document.getElementById('gearBtn');
  var settingsPanel = document.getElementById('settingsPanel');

  gearBtn.addEventListener('click', function(e) {
    e.stopPropagation();
    var open = settingsPanel.style.display === 'block';
    settingsPanel.style.display = open ? 'none' : 'block';
    if (!open) { syncSaturationSlider(); setTimeout(updatePadThumb, 10); }
  });

  document.addEventListener('click', function() {
    settingsPanel.style.display = 'none';
  });

  settingsPanel.addEventListener('click', function(e) {
    e.stopPropagation();
  });

  // Prevent double-tap/double-click zoom globally
  document.addEventListener('dblclick',    function(e) { e.preventDefault(); }, { passive: false });
  document.addEventListener('contextmenu', function(e) { e.preventDefault(); });

  // ── Top bar tab toggle ──
  (function() {
    var topBar = document.getElementById('top-bar');
    var tab    = document.getElementById('top-bar-tab');
    tab.addEventListener('pointerdown', function(e) {
      e.stopPropagation();
      topBar.classList.toggle('hidden');
    });
  }());

  // ── Pie color menu ──
  (function() {
    var pieMenu    = document.getElementById('pie-menu');
    var pieSvg     = document.getElementById('pie-svg');
    var activeTile = null;
    var pieCenter  = { x: 0, y: 0 };
    var hoveredIdx = -1; // -1 = center
    var sliceEls   = [];

    var COLORS = [
      { h: 0,   s: 85, l: 55 },  // Red
      { h: 30,  s: 90, l: 55 },  // Orange
      { h: 58,  s: 90, l: 58 },  // Yellow
      { h: 130, s: 70, l: 42 },  // Green
      { h: 190, s: 80, l: 45 },  // Cyan
      { h: 225, s: 80, l: 52 },  // Blue
      { h: 275, s: 75, l: 55 }   // Violet
    ];

    var R_INNER = 42;  // 32 * 1.3
    var R_OUTER = 107; // 82 * 1.3
    var N = COLORS.length;
    var PAD = 13;

    function makePath(i, ri, ro) {
      var slice = (2 * Math.PI) / N;
      var start = slice * i - Math.PI / 2 - slice / 2 + 0.04;
      var end   = slice * i - Math.PI / 2 + slice / 2 - 0.04;
      var x1 = Math.cos(start), y1 = Math.sin(start);
      var x2 = Math.cos(end),   y2 = Math.sin(end);
      return ['M', x1*ri, y1*ri, 'L', x1*ro, y1*ro,
              'A', ro, ro, 0, 0, 1, x2*ro, y2*ro,
              'L', x2*ri, y2*ri,
              'A', ri, ri, 0, 0, 0, x1*ri, y1*ri, 'Z'].join(' ');
    }

    function buildPie() {
      pieSvg.innerHTML = '';
      sliceEls = [];
      var size = (R_OUTER + PAD) * 2;
      pieSvg.setAttribute('width',  size);
      pieSvg.setAttribute('height', size);
      var g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
      g.setAttribute('transform', 'translate(' + (size/2) + ',' + (size/2) + ')');

      // Slices
      COLORS.forEach(function(c, i) {
        var path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', makePath(i, R_INNER, R_OUTER));
        path.setAttribute('fill', 'hsl(' + c.h + ',' + c.s + '%,' + c.l + '%)');
        path.setAttribute('stroke', 'rgba(0,0,0,0.18)');
        path.setAttribute('stroke-width', '1.5');
        path.setAttribute('pointer-events', 'none');
        g.appendChild(path);
        sliceEls.push(path);
      });

      // Transparent square center — tile shows through
      var hs = R_INNER - 2;
      var rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
      rect.setAttribute('x', -hs); rect.setAttribute('y', -hs);
      rect.setAttribute('width', hs*2); rect.setAttribute('height', hs*2);
      rect.setAttribute('rx', '5');
      rect.setAttribute('fill', 'none');
      rect.setAttribute('stroke', 'rgba(255,255,255,0.4)');
      rect.setAttribute('stroke-width', '1.5');
      rect.setAttribute('pointer-events', 'none');
      g.appendChild(rect);

      pieSvg.appendChild(g);
    }

    function applyTint(tile, color) {
      var tint = tile.querySelector('.tile-tint');
      if (tint) tint.style.background = color || '';
    }

    function setHovered(idx) {
      if (idx === hoveredIdx) return;
      hoveredIdx = idx;
      sliceEls.forEach(function(el, i) {
        el.setAttribute('opacity', (i === idx) ? '0.75' : '1');
        el.setAttribute('transform', (i === idx) ? 'scale(1.06)' : '');
      });
    }

    function idxFromPoint(cx, cy) {
      // cx, cy relative to pie center in screen coords
      var dx = cx - pieCenter.x, dy = cy - pieCenter.y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < R_INNER) return -1; // center
      if (dist > R_OUTER) return -1; // outside
      var angle = Math.atan2(dy, dx) + Math.PI/2; // 0 = up
      if (angle < 0) angle += 2 * Math.PI;
      return Math.floor((angle / (2 * Math.PI)) * N) % N;
    }

    // Document-level handlers while pie is open
    function onPieMove(e) {
      var cx = e.clientX, cy = e.clientY;
      var idx = idxFromPoint(cx, cy);
      setHovered(idx);
      // Preview tint live while hovering
      if (activeTile) {
        if (idx === -1) {
          applyTint(activeTile, activeTile._prevTint || '');
        } else {
          var c = COLORS[idx];
          applyTint(activeTile, 'hsl(' + c.h + ',' + c.s + '%,' + c.l + '%)');
        }
      }
    }

    function onPieUp(e) {
      var idx = idxFromPoint(e.clientX, e.clientY);
      if (activeTile) {
        if (idx === -1) {
          // Center → restore original (clear tint)
          applyTint(activeTile, '');
        } else {
          var c = COLORS[idx];
          applyTint(activeTile, 'hsl(' + c.h + ',' + c.s + '%,' + c.l + '%)');
        }
      }
      hidePie();
    }

    function showPieMenu(tile, _cx, _cy) {
      activeTile = tile;
      var existingTint = tile.querySelector('.tile-tint');
      tile._prevTint = existingTint ? existingTint.style.background : '';

      // Center pie on tile's screen center
      var tr = tile.getBoundingClientRect();
      var cx = tr.left + tr.width  / 2;
      var cy = tr.top  + tr.height / 2;

      // Reparent tile to body as fixed to escape board's stacking context
      tile._boardParent = tile.parentNode;
      tile._boardLeft   = tile.style.left;
      tile._boardTop    = tile.style.top;
      tile.style.position = 'fixed';
      tile.style.left     = tr.left + 'px';
      tile.style.top      = tr.top  + 'px';
      tile.style.zIndex   = '10001';
      document.body.appendChild(tile);

      buildPie();
      var size = (R_OUTER + PAD) * 2;
      pieMenu.style.left = (cx - size/2) + 'px';
      pieMenu.style.top  = (cy - size/2) + 'px';
      pieCenter.x = cx;
      pieCenter.y = cy;
      hoveredIdx = -1;
      pieMenu.classList.add('visible');

      document.addEventListener('pointermove', onPieMove);
      document.addEventListener('pointerup',   onPieUp);
    }

    function hidePie() {
      pieMenu.classList.remove('visible');
      if (activeTile && activeTile._boardParent) {
        activeTile.style.position = 'absolute';
        activeTile.style.left     = activeTile._boardLeft;
        activeTile.style.top      = activeTile._boardTop;
        activeTile.style.zIndex   = String(++topZ);
        activeTile._boardParent.appendChild(activeTile);
      }
      document.removeEventListener('pointermove', onPieMove);
      document.removeEventListener('pointerup',   onPieUp);
      activeTile = null;
    }

    window.showPieMenu = showPieMenu;
  }());

  updateHint();
}());
</script>
</body>
</html>
